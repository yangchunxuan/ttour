name: macos-agent-harness

on:
  push:
    paths:
      - "ai-agent-core/macos_agent/**"
      - ".github/workflows/harness.yml"
  pull_request:
    paths:
      - "ai-agent-core/macos_agent/**"
      - ".github/workflows/harness.yml"

jobs:
  harness:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-agent-core/macos_agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install offline-test dependencies
        run: python -m pip install --upgrade pip pytest openai python-dotenv rich
      - name: Run harness checks
        run: bash check.sh
