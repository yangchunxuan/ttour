<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅游客户 CRM｜城市分段报价版</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F7F8FA;--surface:#FFFFFF;--border:#E8EAF0;
  --text-primary:#1A1D2E;--text-secondary:#6B7280;--text-hint:#9CA3AF;
  --blue:#1B4F8A;--blue-ui:#3B6FE8;--blue-light:#EEF2FD;--blue-mid:#C7D5F8;
  --gold:#B8860B;--green:#1D9E75;--green-light:#E6F5F0;
  --amber:#D97706;--amber-light:#FEF3C7;
  --red:#DC2626;--red-light:#FEE2E2;
  --orange:#EA580C;--orange-light:#FFF0E8;
  --teal:#0F766E;--teal-light:#E6F5F4;
  --radius:10px;--radius-lg:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text-primary);font-size:14px;min-height:100vh;}
.view{display:none;}.view.active{display:block;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-brand{font-size:15px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:8px;}
.topbar-brand span{color:var(--blue);}
.topbar-actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--blue-ui);color:#fff;}.btn-primary:hover{background:#2D5FD6;}
.btn-gold{background:var(--gold);color:#fff;}.btn-gold:hover{filter:brightness(.95);}
.btn-outline{background:transparent;color:var(--text-secondary);border:1px solid var(--border);}.btn-outline:hover{background:var(--bg);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-danger{background:var(--red-light);color:var(--red);border:none;}.btn-danger:hover{background:#FCA5A5;}
.btn-green{background:var(--green);color:#fff;}.btn-green:hover{background:#15805E;}
.dash-header{padding:20px 20px 0;}
.dash-title{font-size:20px;font-weight:600;margin-bottom:4px;}
.dash-sub{font-size:13px;color:var(--text-secondary);}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding:16px 20px;}
.stat-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px;}
.stat-label{font-size:12px;color:var(--text-secondary);margin-bottom:6px;}
.stat-value{font-size:28px;font-weight:700;line-height:1;}
.stat-value.blue{color:var(--blue-ui);}.stat-value.green{color:var(--green);}.stat-value.amber{color:var(--amber);}
.toolbar{padding:0 20px 12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.search-box{flex:1;min-width:180px;position:relative;}
.search-box input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--surface);outline:none;}
.search-box input:focus{border-color:var(--blue-ui);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-hint);}
.filter-sel{padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--surface);outline:none;cursor:pointer;}
.client-list{padding:0 20px 80px;}
.client-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.client-card:hover{border-color:var(--blue-mid);box-shadow:0 2px 8px rgba(59,111,232,0.08);}
.client-card-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--blue-light);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;color:var(--blue-ui);flex-shrink:0;}
.client-name{font-size:15px;font-weight:600;margin-bottom:2px;}
.client-meta{font-size:12px;color:var(--text-secondary);}
.client-card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.tag{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;}
.tag-A{background:#EEF2FD;color:#2D5FD6;}.tag-B{background:var(--amber-light);color:var(--amber);}
.tag-C{background:var(--bg);color:var(--text-secondary);border:1px solid var(--border);}
.tag-status{background:var(--green-light);color:var(--green);}
.tag-status.amber{background:var(--amber-light);color:var(--amber);}
.tag-status.blue{background:var(--blue-light);color:var(--blue-ui);}
.tag-status.gray{background:var(--bg);color:var(--text-secondary);}
.client-card-bottom{display:flex;align-items:center;justify-content:space-between;}
.client-date{font-size:12px;color:var(--text-hint);}
.chevron{color:var(--text-hint);font-size:16px;}
.empty{text-align:center;padding:60px 20px;color:var(--text-secondary);grid-column:1/-1;}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.4;}
.fab{position:fixed;bottom:24px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--blue-ui);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 14px rgba(59,111,232,0.35);display:flex;align-items:center;justify-content:center;z-index:50;transition:transform .15s;}
.fab:hover{transform:scale(1.05);}
.detail-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;min-height:52px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.back-btn{background:none;border:none;cursor:pointer;color:var(--blue-ui);font-size:14px;display:flex;align-items:center;gap:4px;padding:6px 0;flex-shrink:0;}
.detail-topbar-name{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.detail-topbar-meta{font-size:11.5px;color:var(--text-secondary);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.detail-topbar-info{flex:1;min-width:0;padding:6px 0;}
.detail-actions{display:flex;gap:8px;}
.detail-body{padding:16px;padding-bottom:60px;}
.info-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px;}
.info-card-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.section-title{font-size:13px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;}
.client-profile{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.avatar-lg{width:52px;height:52px;border-radius:50%;background:var(--blue-light);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:var(--blue-ui);flex-shrink:0;}
.profile-name{font-size:18px;font-weight:700;margin-bottom:3px;}
.profile-sub{font-size:13px;color:var(--text-secondary);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.info-item{background:var(--bg);border-radius:8px;padding:10px 12px;}
.info-item-label{font-size:11px;color:var(--text-hint);margin-bottom:3px;}
.info-item-value{font-size:13px;font-weight:500;word-break:break-word;}
.chips-row{display:flex;gap:6px;flex-wrap:wrap;}
.chip{font-size:12px;padding:4px 10px;border-radius:20px;background:var(--amber-light);color:var(--amber);font-weight:500;cursor:pointer;}
.chip-add{background:var(--bg);color:var(--text-hint);border:1px dashed var(--border);}
.quote-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.qtab{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;}
.qtab.active{background:var(--blue-ui);color:#fff;border-color:var(--blue-ui);}
.qtab-add{border-style:dashed;}
.quote-block{display:none;}.quote-block.active{display:block;}
.quote-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;padding:10px;background:var(--bg);border-radius:10px;}
/* City Card */
.city-card{border:1px solid var(--border);border-radius:12px;background:#fff;margin-bottom:12px;overflow:hidden;}
.city-head{display:flex;gap:8px;align-items:center;background:linear-gradient(90deg,var(--blue-light),#fff);border-bottom:1px solid var(--border);padding:10px 12px;}
.city-title-input{flex:1;border:1px solid var(--border);border-radius:7px;padding:7px 9px;font-size:13px;font-weight:600;outline:none;background:#fff;}
.city-title-input:focus{border-color:var(--blue-ui);}
.city-body{padding:12px;}
/* Public pricing section */
.public-price-section{background:linear-gradient(135deg,#EEF2FD,#F0F9FF);border:1.5px solid var(--blue-mid);border-radius:10px;padding:12px;margin-bottom:12px;}
.public-price-title{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;}
.public-price-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.public-price-item label{font-size:11px;color:var(--text-secondary);display:block;margin-bottom:4px;}
.pub-input{width:100%;border:1px solid var(--blue-mid);border-radius:7px;padding:7px 9px;font-size:13px;font-weight:600;color:var(--blue);background:#fff;outline:none;text-align:right;}
.pub-input:focus{border-color:var(--blue-ui);}
.pub-input.text-input{text-align:left;}
/* Internal cost section */
.cost-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--text-hint);margin-bottom:8px;user-select:none;}
.cost-toggle:hover{color:var(--text-secondary);}
.cost-section{display:none;}
.cost-section.open{display:block;}
.cost-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cost-item{background:var(--bg);border-radius:9px;padding:8px;}
.cost-label{font-size:11px;color:var(--text-secondary);margin-bottom:5px;}
.cost-input{width:100%;border:1px solid var(--border);border-radius:7px;padding:7px 9px;text-align:right;font-size:13px;background:#fff;outline:none;}
.cost-input:focus{border-color:var(--blue-ui);}
.city-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
.summary-box{border-radius:9px;padding:9px 10px;background:var(--bg);}
.summary-box.cost{background:var(--red-light);}.summary-box.profit{background:var(--orange-light);}.summary-box.suggest{background:var(--amber-light);}
.summary-label{font-size:11px;color:var(--text-secondary);margin-bottom:4px;}
.summary-value{font-size:14px;font-weight:700;}
.summary-value.red{color:var(--red);}.summary-value.orange{color:var(--orange);}.summary-value.amber{color:var(--amber);}
.city-note{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--text-primary);background:var(--surface);margin-top:10px;resize:none;outline:none;font-family:inherit;}
.city-note:focus{border-color:var(--blue-ui);}
/* Quote totals */
.quote-total-panel{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px;}
.total-card{border-radius:12px;padding:12px;background:var(--bg);}
.total-card.internal{background:var(--red-light);}.total-card.noguide{background:var(--blue-light);}.total-card.withguide{background:var(--green-light);}.total-card.per{background:var(--amber-light);}
.total-label{font-size:11px;color:var(--text-secondary);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px;}
.total-value{font-size:20px;font-weight:800;}
.total-value.red{color:var(--red);}.total-value.blue{color:var(--blue-ui);}.total-value.green{color:var(--green);}.total-value.amber{color:var(--amber);}
.quote-note-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--text-primary);background:var(--surface);margin-top:8px;resize:none;outline:none;font-family:inherit;}
.quote-note-input:focus{border-color:var(--blue-ui);}
/* Compare table */
.compare-wrap{overflow-x:auto;margin-top:4px;}
.compare-table{width:100%;border-collapse:collapse;font-size:12px;min-width:620px;}
.compare-table th{padding:8px 10px;background:var(--bg);color:var(--text-secondary);font-weight:500;text-align:left;border-bottom:1px solid var(--border);}
.compare-table td{padding:8px 10px;border-bottom:1px solid var(--border);}
.compare-table tr:last-child td{border-bottom:none;}
.diff-up{color:var(--red);font-weight:500;}.diff-dn{color:var(--green);font-weight:500;}
/* Followup */
.followup-list{margin-bottom:10px;}
.followup-item{border-left:2px solid var(--border);padding:8px 0 8px 12px;margin-bottom:10px;}
.followup-item.pending{border-left-color:var(--amber);}.followup-item.done{border-left-color:var(--green);}
.fu-date{font-size:11px;color:var(--text-hint);margin-bottom:3px;}
.fu-content{font-size:13px;margin-bottom:4px;}
.fu-feedback{font-size:12px;color:var(--text-secondary);}
.fu-todo{font-size:12px;color:var(--amber);font-weight:500;}
.add-followup-form{background:var(--bg);border-radius:10px;padding:12px;margin-top:4px;}
.form-row{margin-bottom:10px;}
.form-label{font-size:12px;color:var(--text-secondary);margin-bottom:4px;display:block;}
.form-input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px;color:var(--text-primary);background:var(--surface);outline:none;font-family:inherit;}
.form-input:focus{border-color:var(--blue-ui);}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;padding:20px;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px;}
.modal-footer{display:flex;gap:10px;margin-top:16px;}
.helper-text{font-size:12px;color:var(--text-hint);line-height:1.5;margin-top:6px;}
@media(min-width:600px){
  .stats-grid{grid-template-columns:repeat(4,1fr);}
  .info-grid{grid-template-columns:repeat(3,1fr);}
  .modal-overlay{align-items:center;}
  .modal{border-radius:16px;margin:16px;}
}
@media(min-width:900px){
  .client-list{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .client-list .client-card{margin-bottom:0;}
}
@media(max-width:760px){
  .detail-actions{display:none;}
  .public-price-grid{grid-template-columns:1fr;}
  .cost-grid{grid-template-columns:1fr;}
  .city-summary,.quote-total-panel{grid-template-columns:1fr 1fr;}
  .topbar{height:auto;min-height:52px;padding:8px 14px;align-items:flex-start;}
  .topbar-actions{justify-content:flex-end;}
}
@media(max-width:520px){
  .info-grid,.form-row-2,.city-summary,.quote-total-panel{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div id="view-list" class="view active">
  <div class="topbar">
    <div class="topbar-brand">✈ <span>旅游</span>CRM</div>
    <div class="topbar-actions">
      <button class="btn btn-outline btn-sm" onclick="exportJSON()">导出JSON</button>
      <button class="btn btn-outline btn-sm" onclick="exportCSV()">导出CSV</button>
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('import-input').click()">导入</button>
      <button class="btn btn-outline btn-sm" style="color:#DC2626;border-color:#DC2626" onclick="clearAllData()">清除数据</button>
      <button class="btn btn-primary btn-sm" onclick="openSyncModal()">📱 多设备同步</button>
      <input type="file" id="import-input" accept=".json" style="display:none" onchange="importJSON(event)">
    </div>
  </div>
  <div class="dash-header">
    <div class="dash-title">客户总览</div>
    <div class="dash-sub" id="dash-date"></div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">总客户数</div><div class="stat-value blue" id="s-total">0</div></div>
    <div class="stat-card"><div class="stat-label">已成交</div><div class="stat-value green" id="s-done">0</div></div>
    <div class="stat-card"><div class="stat-label">报价中</div><div class="stat-value amber" id="s-quote">0</div></div>
    <div class="stat-card"><div class="stat-label">意向A级</div><div class="stat-value blue" id="s-a">0</div></div>
  </div>
  <div class="toolbar">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="搜索客户姓名、国家、渠道..." id="search-input" oninput="renderList()">
    </div>
    <select class="filter-sel" id="filter-status" onchange="renderList()">
      <option value="">全部状态</option>
      <option>初次接触</option><option>报价中</option><option>行程确认</option><option>已成交</option><option>暂缓</option>
    </select>
    <select class="filter-sel" id="filter-level" onchange="renderList()">
      <option value="">全部等级</option>
      <option>A</option><option>B</option><option>C</option>
    </select>
  </div>
  <div class="client-list" id="client-list"></div>
  <button class="fab" onclick="openNewClient()">＋</button>
</div>

<div id="view-detail" class="view">
  <div class="detail-topbar">
    <button class="back-btn" onclick="showList()">← 返回</button>
    <div class="detail-topbar-info">
      <div class="detail-topbar-name" id="detail-topbar-name"></div>
      <div class="detail-topbar-meta" id="detail-topbar-meta"></div>
    </div>
    <div class="detail-actions">
      <button class="btn btn-gold btn-sm" onclick="generateInvoicePDF()">生成客户报价单PDF</button>
      <button class="btn btn-danger btn-sm" onclick="deleteClient()">删除</button>
    </div>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- 新增/编辑客户 Modal -->
<div class="modal-overlay" id="modal-client">
  <div class="modal">
    <div class="modal-title" id="modal-title">新增客户</div>
    <button class="btn btn-outline btn-sm" style="width:100%;margin-bottom:12px;border-style:dashed;color:#0070C0;border-color:#0070C0" onclick="openPasteModal()">📋 粘贴对话内容，自动识别填入</button>
    <div class="form-row">
      <label class="form-label">客户姓名 *</label>
      <input class="form-input" id="f-name" placeholder="如：Leticia / Annette Hayden">
    </div>
    <div class="form-row-2">
      <div class="form-row" style="margin:0">
        <label class="form-label">所属国家/城市</label>
        <input class="form-input" id="f-country" placeholder="如：美国·洛杉矶">
      </div>
      <div class="form-row" style="margin:0">
        <label class="form-label">主要跟进方式</label>
        <select class="form-input" id="f-contact-channel">
          <option value="">请选择</option>
          <option>Messenger</option><option>WhatsApp</option><option>Instagram</option><option>邮箱</option>
        </select>
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-row" style="margin:0">
        <label class="form-label">出行人数</label>
        <input class="form-input" id="f-pax" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="4">
      </div>
      <div class="form-row" style="margin:0">
        <label class="form-label">行程天数</label>
        <input class="form-input" id="f-days" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="17">
      </div>
    </div>
    <div class="form-row-2" style="grid-template-columns:1fr 1fr 1fr">
      <div class="form-row" style="margin:0">
        <label class="form-label">成人人数</label>
        <input class="form-input" id="f-pax-adults" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="2" oninput="syncPaxTotal()">
      </div>
      <div class="form-row" style="margin:0">
        <label class="form-label">儿童人数</label>
        <input class="form-input" id="f-pax-children" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="0" oninput="syncPaxTotal()">
      </div>
      <div class="form-row" style="margin:0">
        <label class="form-label">老人人数</label>
        <input class="form-input" id="f-pax-seniors" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="0" oninput="syncPaxTotal()">
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">人员备注（儿童年龄等，仅内部记录）</label>
      <input class="form-input" id="f-pax-detail" placeholder="如：儿童年龄 6、8岁">
    </div>
    <div class="form-row">
      <label class="form-label">目标出行时间</label>
      <input class="form-input" id="f-travel-time" placeholder="如：September 2026">
    </div>
    <div class="form-row">
      <label class="form-label">路线 / 进出港安排</label>
      <input class="form-input" id="f-route" placeholder="如：广州 → 张家界 → 重庆 → 成都">
    </div>
    <div class="form-row">
      <label class="form-label">导游方案</label>
      <select class="form-input" id="f-guide">
        <option value="">请选择</option>
        <option>中文导游</option><option>关键日英文导游</option><option>全程英文导游</option>
      </select>
    </div>

<script>
let clients = [];
let currentId = null;
let editingId = null;
let activeQuoteIndex = 0;

const COST_ITEMS = [
  {key:'hotel', label:'酒店住宿'},
  {key:'tickets', label:'景点门票'},
  {key:'intercity', label:'城市间交通'},
  {key:'car', label:'当地包车'},
  {key:'misc', label:'餐食/体验/杂费'}
];

const STATUS_COLOR = {'初次接触':'blue','报价中':'amber','行程确认':'blue','已成交':'','暂缓':'gray'};
const CONTACT_OPTIONS = ['Messenger','WhatsApp','Instagram','邮箱'];
const CURRENCY_SYMBOL = {
  USD:'$', CAD:'CA$', AUD:'A$', NZD:'NZ$', SGD:'S$',
  EUR:'€', GBP:'£', AED:'AED ', CNY:'¥', HKD:'HK$',
  THB:'฿', MYR:'RM', PHP:'₱', JPY:'¥'
};

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function parseNum(v){ const n=parseFloat(v); return isNaN(n)?0:n; }
function getSymbol(c){ return CURRENCY_SYMBOL[c]||c+' '; }
function fmt(v,c){ const n=parseNum(v); if(!n)return '—'; return getSymbol(c)+Math.round(n).toLocaleString(); }
function fmtA(v,c){ return getSymbol(c)+Math.round(parseNum(v)).toLocaleString(); }
function escapeHTML(s){ return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }

function emptyCosts(){ const o={}; COST_ITEMS.forEach(i=>o[i.key]=''); return o; }
function costsFromArray(arr){
  const o=emptyCosts();
  COST_ITEMS.forEach((item,idx)=>{ o[item.key]=Array.isArray(arr)?(arr[idx]||''):''; });
  return o;
}
function normalizeCity(city){
  if(!city) city={};
  if(Array.isArray(city.costs)) city.costs=costsFromArray(city.costs);
  if(!city.costs) city.costs=emptyCosts();
  COST_ITEMS.forEach(i=>{ if(city.costs[i.key]===undefined) city.costs[i.key]=''; });
  if(!city.id) city.id=uid();
  if(city.name===undefined) city.name='';
  if(city.itinerary===undefined) city.itinerary='';
  if(city.priceNoGuide===undefined) city.priceNoGuide='';
  if(city.priceWithGuide===undefined) city.priceWithGuide='';
  if(city.priceAdult===undefined) city.priceAdult=city.priceNoGuide||'';
  if(city.priceChild===undefined) city.priceChild='';
  if(city.priceSenior===undefined) city.priceSenior='';
  if(city.profit===undefined) city.profit='';
  if(city.note===undefined) city.note='';
  return city;
}
function parsePaxCounts(paxDetail, fallbackPax){
  let adults=0, children=0, seniors=0;
  if(paxDetail){
    // Chinese: 2大人 / 2小孩 / 2老人
    const amCN=paxDetail.match(/(\d+)\s*大人/);
    const cmCN=paxDetail.match(/(\d+)\s*(?:位\s*)?(?:小孩|儿童)/);
    const smCN=paxDetail.match(/(\d+)\s*(?:位\s*)?(?:老人|长者)/);
    // English: 2 adults / 2 children / 2 kids / 2 seniors
    const amEN=paxDetail.match(/(\d+)\s*adults?/i);
    const cmEN=paxDetail.match(/(\d+)\s*(?:children|childs?|kids?)/i);
    const smEN=paxDetail.match(/(\d+)\s*seniors?/i);
    if(amCN) adults=parseInt(amCN[1]);
    else if(amEN) adults=parseInt(amEN[1]);
    // handle "2 + 3儿童" or "2＋3儿童" — number before + is adults
    if(!adults){ const pm=paxDetail.match(/(\d+)\s*[+＋]/); if(pm) adults=parseInt(pm[1]); }
    if(cmCN) children=parseInt(cmCN[1]);
    else if(cmEN) children=parseInt(cmEN[1]);
    if(smCN) seniors=parseInt(smCN[1]);
    else if(smEN) seniors=parseInt(smEN[1]);
  }
  const total=adults+children+seniors;
  if(total===0){ adults=fallbackPax||1; }
  else if(fallbackPax && total<fallbackPax){ adults+=fallbackPax-total; }
  return {adults, children, seniors};
}
function normalizeTransport(t){
  if(!t) t={};
  if(!t.id) t.id=uid();
  if(t.route===undefined) t.route='';
  if(t.type===undefined) t.type='';
  if(t.seatClass===undefined) t.seatClass='';
  if(t.price===undefined) t.price='';
  // 高铁/火车儿童票
  if(t.childFree===undefined) t.childFree='';        // 未满6岁，无座免票
  if(t.childHalf===undefined) t.childHalf='';        // 6-14岁，有座半价
  if(t.childFull===undefined) t.childFull='';        // 14岁及以上，全价
  if(t.childHalfPrice===undefined) t.childHalfPrice='';
  // 飞机儿童票
  if(t.childInfant===undefined) t.childInfant='';    // 出生-2岁，成人票×10%
  if(t.childFlight===undefined) t.childFlight='';    // 2-12岁，半价
  if(t.childFlightFull===undefined) t.childFlightFull=''; // 12岁及以上，全价
  if(t.childInfantPrice===undefined) t.childInfantPrice='';
  if(t.childFlightPrice===undefined) t.childFlightPrice='';
  if(t.childTicket!==undefined){ delete t.childTicket; }
  if(t.childPrice!==undefined){ delete t.childPrice; }
  return t;
}
function normalizeQuote(q){
  if(!q) q={};
  if(!q.currency) q.currency='USD';
  if(!q.date) q.date=new Date().toISOString().slice(0,10);
  if(!Array.isArray(q.cities)){
    q.cities=[{id:uid(),name:'',itinerary:'',priceNoGuide:'',priceWithGuide:'',costs:costsFromArray(q.costs||[]),profit:q.profit||'',note:q.note||''}];
  }
  q.cities=q.cities.map(normalizeCity);
  if(q.note===undefined) q.note='';
  if(q.guideType===undefined) q.guideType='';
  if(q.guidePrice===undefined) q.guidePrice='';
  if(q.guidePriceCN===undefined) q.guidePriceCN='';
  if(q.guidePriceKeyEN===undefined) q.guidePriceKeyEN='';
  if(q.guidePriceFullEN===undefined) q.guidePriceFullEN='';
  if(q.selectedGuide===undefined) q.selectedGuide=''; // 'CN' | 'KeyEN' | 'FullEN' | ''
  if(!Array.isArray(q.transports)) q.transports=[];
  q.transports=q.transports.map(normalizeTransport);
  return q;
}
function normalizeClient(c){
  if(!c.id) c.id=uid();
  if(!Array.isArray(c.quotes)) c.quotes=[];
  c.quotes=c.quotes.map(normalizeQuote);
  if(!Array.isArray(c.needs)) c.needs=[];
  if(!Array.isArray(c.followups)) c.followups=[];
  if(!Array.isArray(c.itineraries)) c.itineraries=[];
  if(!c.createdAt) c.createdAt=new Date().toLocaleDateString('zh-CN');
  if(c.contactChannel===undefined) c.contactChannel='';
  if(c.paxAdults===undefined) c.paxAdults='';
  if(c.paxChildren===undefined) c.paxChildren='';
  if(c.paxSeniors===undefined) c.paxSeniors='';
  return c;
}
function load(){
  try{ clients=JSON.parse(localStorage.getItem('tcrm_clients')||'[]'); }catch(e){ clients=[]; }
  clients=clients.map(normalizeClient); save();
}
function save(){ localStorage.setItem('tcrm_clients',JSON.stringify(clients)); }

function calcCity(city){
  city=normalizeCity(city);
  const cost=COST_ITEMS.reduce((s,i)=>s+parseNum(city.costs[i.key]),0);
  const profit=parseNum(city.profit);
  const suggested=cost+profit;
  return {cost,profit,suggested};
}
function getClientPax(c){
  const a=parseInt(c&&c.paxAdults)||0;
  const ch=parseInt(c&&c.paxChildren)||0;
  const s=parseInt(c&&c.paxSeniors)||0;
  const total=a+ch+s;
  if(total>0) return {adults:a,children:ch,seniors:s,total};
  const fallback=parseInt(c&&c.pax)||1;
  return {adults:fallback,children:0,seniors:0,total:fallback};
}
function calcQuoteTotals(q, pax){
  q=normalizeQuote(q);
  if(!pax) pax={adults:1,children:0,seniors:0,total:1};
  let cost=0, cityPerAdult=0, cityGroupTotal=0, transTotal=0;
  q.cities.forEach(city=>{
    cost+=calcCity(city).cost;
    const ap=parseNum(city.priceAdult||city.priceNoGuide);
    const cp=parseNum(city.priceChild);
    const sp=parseNum(city.priceSenior);
    cityPerAdult+=ap;
    cityGroupTotal+=ap*pax.adults+cp*pax.children+sp*pax.seniors;
  });
  let guideTotal=0;
  if(q.selectedGuide==='CN') guideTotal=parseNum(q.guidePriceCN);
  else if(q.selectedGuide==='KeyEN') guideTotal=parseNum(q.guidePriceKeyEN);
  else if(q.selectedGuide==='FullEN') guideTotal=parseNum(q.guidePriceFullEN);
  else guideTotal=parseNum(q.guidePrice)||0; // fallback for legacy data
  q.transports.forEach(t=>{
    const ap=parseNum(t.price);
    if(isFlightTransport(t.type)){
      const infantP=parseNum(t.childInfantPrice)||(ap*0.1);
      const flightP=parseNum(t.childFlightPrice)||(ap*0.5);
      const nInfant=parseInt(t.childInfant)||0;
      const nFlight=parseInt(t.childFlight)||0;
      const nFlightFull=parseInt(t.childFlightFull)||0;
      transTotal+=ap*pax.adults+ap*pax.seniors+infantP*nInfant+flightP*nFlight+ap*nFlightFull;
    } else {
      const halfPrice=parseNum(t.childHalfPrice)||(ap*0.5);
      const nFree=parseInt(t.childFree)||0;
      const nHalf=parseInt(t.childHalf)||0;
      const nFull=parseInt(t.childFull)||0;
      transTotal+=ap*pax.adults+ap*pax.seniors+halfPrice*nHalf+ap*nFull;
    }
  });
  const grandTotal=cityGroupTotal+guideTotal+transTotal;
  const totalCost=cost+guideTotal+transTotal; // city cost + guide + transport (all at face value)
  const markup=cityGroupTotal-cost; // profit only from city markup
  const markupPct=cost>0?Math.round(markup/cost*100):0;
  return {cost, totalCost, cityTotal:cityPerAdult, cityGroupTotal, guideTotal, transTotal, grandTotal, markup, markupPct};
}
function latestQuote(c){ if(!c||!c.quotes||!c.quotes.length)return null; return c.quotes[c.quotes.length-1]; }
function getClient(){ return clients.find(x=>x.id===currentId); }

function updateStats(){
  document.getElementById('s-total').textContent=clients.length;
  document.getElementById('s-done').textContent=clients.filter(c=>c.status==='已成交').length;
  document.getElementById('s-quote').textContent=clients.filter(c=>c.status==='报价中').length;
  document.getElementById('s-a').textContent=clients.filter(c=>c.level==='A').length;
  const d=new Date();
  document.getElementById('dash-date').textContent=d.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
}

function isTravelUrgent(travelTime){
  if(!travelTime) return false;
  const now=new Date();
  const nowY=now.getFullYear(), nowM=now.getMonth()+1;
  const text=travelTime.toLowerCase();
  const eng=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const found=[];
  eng.forEach((m,i)=>{ if(text.includes(m)) found.push({m:i+1,y:nowY}); });
  for(let m=1;m<=12;m++){ if(text.includes(m+'月')||text.includes(m+'月份')) found.push({m,y:nowY}); }
  // detect explicit year
  const yMatch=travelTime.match(/20(\d\d)/);
  const explicitY=yMatch?parseInt(yMatch[0]):null;
  for(const f of found){
    const fy=explicitY||( f.m<nowM ? nowY+1 : nowY );
    const diff=(fy-nowY)*12+(f.m-nowM);
    if(diff>=0&&diff<=3) return true;
  }
  return false;
}
function renderList(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const st=document.getElementById('filter-status').value;
  const lv=document.getElementById('filter-level').value;
  let list=clients.filter(c=>{
    const t=[c.name,c.country,c.contactChannel,c.paxDetail,c.route].join(' ').toLowerCase();
    if(q&&!t.includes(q))return false;
    if(st&&c.status!==st)return false;
    if(lv&&c.level!==lv)return false;
    return true;
  });
  const el=document.getElementById('client-list');
  if(!list.length){ el.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><p>暂无客户，点击右下角 ＋ 添加</p></div>`; updateStats(); return; }
  el.innerHTML=list.map(c=>{
    const initials=(c.name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const lastF=(c.followups||[]).slice(-1)[0];
    const dateStr=lastF?'最近跟进：'+lastF.date:(c.createdAt||'');
    const sc=STATUS_COLOR[c.status]||'';
    const lq=latestQuote(c);
    const tot=lq?calcQuoteTotals(lq,getClientPax(c)):{grandTotal:0,cityGroupTotal:0};
    const urgent=isTravelUrgent(c.travelTime);
    const urgentStyle=urgent?'border:2px solid #F59E0B;background:linear-gradient(135deg,#FFFBEB 0%,#ffffff 60%);box-shadow:0 2px 12px rgba(245,158,11,.18);':'';
    const needsAction=c.status!=='已成交'&&c.status!=='暂缓';
    return `<div class="client-card" onclick="showDetail('${c.id}')" style="${urgentStyle}">
      <div class="client-card-top">
        <div style="position:relative;flex-shrink:0">
          <div class="avatar">${escapeHTML(initials)}</div>
          ${needsAction?'<span style="position:absolute;top:0;right:0;width:10px;height:10px;background:#EF4444;border-radius:50%;border:2px solid #fff"></span>':''}
        </div>
        <div style="flex:1">
          <div class="client-name">${escapeHTML(c.name||'未命名')}${urgent?' <span style="font-size:11px;background:#F59E0B;color:#fff;border-radius:4px;padding:1px 5px;font-weight:600;vertical-align:middle">⚡ 近期出行</span>':''}</div>
          <div class="client-meta">${escapeHTML(c.country||'')} ${c.paxDetail?'· '+escapeHTML(c.paxDetail):''}</div>
        </div>
        <span class="chevron">›</span>
      </div>
      <div class="client-card-tags">
        ${c.level?`<span class="tag tag-${escapeHTML(c.level)}">${escapeHTML(c.level)}级</span>`:''}
        ${c.status?`<span class="tag tag-status ${sc}">${escapeHTML(c.status)}</span>`:''}
        ${c.contactChannel?`<span class="tag" style="background:var(--blue-light);color:var(--blue-ui)">${escapeHTML(c.contactChannel)}</span>`:''}
        ${c.travelTime?`<span class="tag" style="background:${urgent?'#FEF3C7;color:#92400E':'var(--teal-light);color:var(--teal)'}">📅 ${escapeHTML(c.travelTime)}</span>`:''}
        ${tot.grandTotal?`<span class="tag" style="background:var(--green-light);color:var(--green)">报价 ${fmtA(tot.grandTotal,lq.currency)}</span>`:''}
      </div>
      <div class="client-card-bottom">
        <span class="client-date">${escapeHTML(dateStr)}</span>
      </div>
    </div>`;
  }).join('');
  updateStats();
}

function showDetail(id){
  currentId=id; activeQuoteIndex=0;
  const c=clients.find(x=>x.id===id); if(!c)return;
  document.getElementById('view-list').classList.remove('active');
  document.getElementById('view-detail').classList.add('active');
  document.getElementById('detail-topbar-name').textContent=c.name||'';
  // 组装第二行：人数 | 路线 | 天数
  const metaParts=[];
  const pax=getClientPax(c);
  const paxStr=[pax.adults?pax.adults+' adult'+(pax.adults>1?'s':''):'',
    pax.children?pax.children+' child'+(pax.children===1?'':'ren'):'',
    pax.seniors?pax.seniors+' senior'+(pax.seniors>1?'s':''):''].filter(Boolean).join(' + ');
  if(paxStr) metaParts.push('👥 '+paxStr);
  if(c.route) metaParts.push('🗺️ '+c.route);
  if(c.days) metaParts.push('📅 '+c.days+'天');
  else if(c.travelTime) metaParts.push('📅 '+c.travelTime);
  document.getElementById('detail-topbar-meta').textContent=metaParts.join('   |   ');
  renderDetail(c);
}

function renderDetail(c){
  c=normalizeClient(c); save();
  const initials=(c.name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const quotes=c.quotes||[];
  const followups=c.followups||[];

  let quoteTabs=quotes.map((q,i)=>`<span style="display:inline-flex;align-items:center;gap:2px">
    <button class="qtab${i===activeQuoteIndex?' active':''}" onclick="switchQTab(${i})" style="border-radius:20px 0 0 20px;border-right:none;padding-right:8px">第${i+1}次报价</button><button onclick="deleteQuote(${i})" title="删除此报价" style="font-size:11px;padding:5px 7px;border-radius:0 20px 20px 0;border:1px solid var(--border);border-left:none;background:transparent;cursor:pointer;color:var(--text-hint);line-height:1" onmouseover="this.style.background='#FEE2E2';this.style.color='#DC2626'" onmouseout="this.style.background='transparent';this.style.color='var(--text-hint)'">×</button>
  </span>`).join('');

        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:4px;" onclick="saveFollowup()">保存跟进记录</button>

  const today=new Date().toISOString().slice(0,10);

}

function isFlightTransport(type){
  return /flight|飞机|plane|airline|air\s*ticket/i.test(type||'');
}
function updateTransportField(qi,ti,field,val){
  const c=getClient(); if(!c)return;
  const t=c.quotes[qi].transports[ti];
  const wasFlight=isFlightTransport(t.type);
  t[field]=val;
  const nowFlight=isFlightTransport(t.type);
  save();
  // 交通方式改变导致票价规则切换，需重绘整个区块
  if(field==='type'&&wasFlight!==nowFlight){ renderDetail(c); return; }
  recalcQuoteUI(qi);
}

function recalcInternalUI(qi,ci){
  const c=getClient(); if(!c||!c.quotes[qi])return;
  const city=c.quotes[qi].cities[ci];
  const r=calcCity(city);
  const q=c.quotes[qi];
  const set=(id,v)=>{ const el=document.getElementById(id); if(el)el.textContent=v; };
  set(`city-cost-${qi}-${ci}`,fmt(r.cost,q.currency));
  set(`city-suggest-${qi}-${ci}`,fmt(r.suggested,q.currency));
  recalcQuoteUI(qi);
}
function recalcQuoteUI(qi){
  const c=getClient(); if(!c||!c.quotes[qi])return;
  const q=c.quotes[qi];
  const pax=getClientPax(c);
  const r=calcQuoteTotals(q,pax);
  const set=(id,v)=>{ const el=document.getElementById(id); if(el)el.textContent=v; };
  set(`qt-cost-${qi}`,fmt(r.totalCost,q.currency));
  set(`qt-markup-${qi}`,fmt(r.markup,q.currency));
  const pctEl=document.getElementById(`qt-markup-pct-${qi}`);
  if(pctEl) pctEl.textContent=r.markupPct+'%';
  set(`qt-city-${qi}`,fmt(r.cityGroupTotal,q.currency));
  set(`qt-guide-${qi}`,fmt(r.guideTotal,q.currency));
  set(`qt-trans-${qi}`,fmt(r.transTotal,q.currency));
  set(`qt-grand-${qi}`,fmt(r.grandTotal,q.currency));
  // 同步更新对比表
  set(`cmp-city-${qi}`,fmt(r.cityGroupTotal,q.currency));
  set(`cmp-grand-${qi}`,fmt(r.grandTotal,q.currency));
  // 更新本行及下一行的差额
  const quotes=c.quotes;
  [qi, qi+1].forEach(i=>{
    if(!quotes[i]) return;
    const ri=calcQuoteTotals(quotes[i],pax);
    const prev=i>0?calcQuoteTotals(quotes[i-1],pax).grandTotal:null;
    const diff=prev!==null?ri.grandTotal-prev:null;
    const diffEl=document.getElementById(`cmp-diff-${i}`);
    if(!diffEl) return;
    if(diff===null) diffEl.innerHTML='—';
    else if(diff>0) diffEl.innerHTML=`<span class="diff-up">+${fmtA(diff,quotes[i].currency)}</span>`;
    else if(diff<0) diffEl.innerHTML=`<span class="diff-dn">-${fmtA(Math.abs(diff),quotes[i].currency)}</span>`;
    else diffEl.innerHTML='持平';
  });
}

    todo:document.getElementById('fu-todo').value,

  const name=document.getElementById('f-name').value.trim();
  if(!name){ alert('请填写客户姓名'); return; }
  const data={name,country:document.getElementById('f-country').value,contactChannel:document.getElementById('f-contact-channel').value,
    pax:document.getElementById('f-pax').value,
    paxAdults:document.getElementById('f-pax-adults').value,

    level:document.getElementById('f-level').value,status:document.getElementById('f-status').value,
    note:document.getElementById('f-note').value};
  if(editingId){
    const idx=clients.findIndex(x=>x.id===editingId);
    if(idx>-1) clients[idx]=normalizeClient({...clients[idx],...data});
  } else {
    const pending=window._pendingFollowups||[];
    const followups=pending.map(f=>({id:uid(),date:f.date||new Date().toISOString().slice(0,10),channel:f.channel||'',content:f.content||'',nextDate:f.nextDate||'',status:f.status||''}));
    clients.unshift(normalizeClient({id:uid(),createdAt:new Date().toLocaleDateString('zh-CN'),quotes:[],needs:[],followups,...data}));
    window._pendingFollowups=null;
  }
  save(); closeModal();
  if(editingId&&currentId) renderDetail(getClient());
  else { renderList(); updateStats(); }
}

  clients=clients.filter(x=>x.id!==currentId); save(); showList();

function formatPaxEN(adults, children, seniors){
  const p=[];
  if(adults) p.push(adults+' adult'+(adults>1?'s':''));
  if(children) p.push(children+' child'+(children===1?'':'ren'));
  if(seniors) p.push(seniors+' senior'+(seniors>1?'s':''));
  return p.join(' + ')||'—';
}
function formatTravelTimeEN(t){
  if(!t) return '';
  // keep only segment before Chinese notes (，初步/参考/备注 etc.)
  t=t.split(/，/)[0].trim();
  // translate N月M日 → English month name + day
  const MN=['','January','February','March','April','May','June','July','August','September','October','November','December'];
  t=t.replace(/(\d{1,2})月(\d{1,2})日?/g,(_,m,d)=>MN[parseInt(m)]+' '+parseInt(d));
  t=t.replace(/(\d{4})年/g,'$1 ');
  // clean up separators
  t=t.replace(/[-–—]\s*/g,' – ');
  return t.trim();
}

function parseClientPaste(text){
  const result={};
  const followups=[];
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
  // Extract key:value pairs
  const kv=(key)=>{
    for(const line of lines){
      const m=line.match(new RegExp('(?:'+key+')[：:](.+)'));
      if(m&&m[1]) return m[1].trim();
    }
    return '';
  };
  result.name=kv('客户姓名');
  result.country=kv('国家|所属国家');
  result.channel=kv('跟进方式|联系方式');
  result.travelTime=kv('目标出行时间|出行时间|出行日期');
  result.route=kv('意向路线|路线|行程路线');
  result.status=kv('当前状态|跟进状态|状态');
  result.level=kv('意向等级|等级');
  result.note=kv('备注');
  result.paxDetail=kv('人员构成|人员备注');
  // Days: extract number from "5D4N" or "5天" or "Maybe 5D4N"
  const daysRaw=kv('初步行程天数|行程天数|天数');
  const daysM=daysRaw.match(/(\d+)\s*[Dd天]/);
  result.days=daysM?daysM[1]:'';
  result.daysRaw=daysRaw;
  // Pax total
  const paxRaw=kv('出行人数');
  const paxM=paxRaw.match(/(\d+)/);
  result.pax=paxM?paxM[1]:'';
  // Pax breakdown from 人员构成
  const compRaw=result.paxDetail||kv('人员构成');
  const adultM=compRaw.match(/(\d+)\s*(?:位|名|个)?(?:成人|大人|adult)/i);
  const childM=compRaw.match(/(\d+)\s*(?:位|名|个)?(?:儿童|小孩|child)/i);
  const seniorM=compRaw.match(/(\d+)\s*(?:位|名|个)?(?:老人|长者|senior)/i);
  result.adults=adultM?adultM[1]:'';
  result.children=childM?childM[1]:'';
  result.seniors=seniorM?seniorM[1]:'';

  // Parse follow-up sections
  const fuBlocks=text.split(/跟进记录\s*\d+/);
  for(let i=1;i<fuBlocks.length;i++){
    const block=fuBlocks[i];
    const fuLines=block.split('\n').map(l=>l.trim()).filter(l=>l);
    const fkv=(key)=>{
      for(const line of fuLines){
        const m=line.match(new RegExp('(?:'+key+')[：:](.+)'));
        if(m&&m[1]) return m[1].trim();
      }
      return '';
    };
    // Multi-line content fields
    const getMultiLine=(key)=>{
      let collecting=false, out=[];
      const re=new RegExp('(?:'+key+')[：:]');
      for(const line of fuLines){
        if(re.test(line)){
          collecting=true;
          const rest=line.replace(re,'').trim();
          if(rest) out.push(rest);
        } else if(collecting){
          if(/^[一-龥a-zA-Z]+[：:]/.test(line)) break;
          if(line) out.push(line);
        }
      }
      return out.join('\n');
    };
    const date=fkv('跟进日期');
    const channel=fkv('跟进方式|联系方式');
    const content=getMultiLine('跟进内容摘要|内容摘要|跟进内容');
    const feedback=getMultiLine('客户反馈');
    const todo=getMultiLine('待办事项');
    const nextDate=fkv('下次跟进日期|下次跟进');
    const fullContent=[
      content,
      feedback?'【客户反馈】'+feedback:'',
      todo?'【待办】'+todo:''
    ].filter(Boolean).join('\n');
    if(date||content) followups.push({date,channel,content:fullContent,nextDate,status:''});
  }
  result.followups=followups;
  return result;
}

function parseItineraryRows(rows, filename){
  // Find title row (merged, non-empty, no "Day" keyword)
  let title='', subtitle='', headerRowIdx=-1, notesRow='';
  for(let i=0;i<rows.length;i++){
    const row=rows[i];
    const first=String(row[0]||'').trim();
    const joined=row.map(x=>String(x||'').trim()).join(' ');
    // Detect header row: contains "Day" or "day" in first col or "Schedule" somewhere
    if(/^day$/i.test(first)||(/^\d+$/.test(first)&&i>0)){
      if(headerRowIdx<0) headerRowIdx=i;
    }
    if(joined.toLowerCase().includes('schedule')||joined.toLowerCase().includes('activities')){
      headerRowIdx=i; break;
    }
  }
  // Rows before header = title/subtitle
  if(headerRowIdx>0) title=rows.slice(0,headerRowIdx).map(r=>r.filter(x=>x).join(' ')).filter(x=>x).join(' | ');
  // If no header found, treat row 0 as title, row 2 as start
  if(headerRowIdx<0) headerRowIdx=2;
  // Extract day rows
  const days=[];
  for(let i=headerRowIdx+1;i<rows.length;i++){
    const row=rows[i];
    const dayVal=String(row[0]||'').trim();
    const actVal=String(row[1]||'').trim();
    if(!dayVal&&!actVal) continue;
    // Check if it's a notes/footer row (no numeric day)
    if(dayVal&&!/^\d+$/.test(dayVal)&&!actVal){ notesRow+=(notesRow?'\n':'')+row.filter(x=>x).join(' '); continue; }
    if(actVal||/^\d+$/.test(dayVal)){
      days.push({
        day: dayVal||String(days.length+1),
        activities: actVal,
        meals: String(row[2]||'').trim(),
        accommodation: String(row[3]||'').trim()
      });
    }
  }
  // Strip file extension for name
  const name=filename.replace(/\.[^.]+$/,'');
  return {name, title, days, notes:'', notesRow};
}

}
// ────────────────────────────────────────────────────────────────
function openSyncModal(){
  try{ document.getElementById('sync-export-code').value=btoa(unescape(encodeURIComponent(JSON.stringify(clients)))); }
  catch(e){ document.getElementById('sync-export-code').value=btoa(JSON.stringify(clients)); }
  document.getElementById('sync-import-code').value='';
  document.getElementById('modal-sync').classList.add('open');
}
function copySyncCode(){
  const ta=document.getElementById('sync-export-code');
  ta.select(); ta.setSelectionRange(0,99999);
  try{ document.execCommand('copy'); alert('同步码已复制！'); }
  catch(e){ alert('请手动复制上方文本框中的同步码。'); }
}
function importSyncCode(){
  const code=document.getElementById('sync-import-code').value.trim();
  if(!code){ alert('请先粘贴同步码'); return; }
  try{
    let data;
    try{ data=JSON.parse(decodeURIComponent(escape(atob(code)))); }
    catch(e){ data=JSON.parse(atob(code)); }
    if(!Array.isArray(data))throw new Error();
    if(!confirm(`同步 ${data.length} 条客户数据？同ID的客户将被覆盖，新客户将合并添加。`))return;
    data.forEach(c=>{ const nc=normalizeClient(c); const idx=clients.findIndex(x=>x.id===nc.id); if(idx>-1)clients[idx]=nc; else clients.push(nc); });
    save(); renderList(); updateStats();
    document.getElementById('modal-sync').classList.remove('open');
    alert('同步成功！');
  }catch(err){ alert('同步码格式错误，请确认复制完整。'); }
}

// ── 跟进提醒系统 ──────────────────────────────────────────
function todayStr(){
  return new Date().toISOString().slice(0,10); // YYYY-MM-DD
}
function getDueFollowups(){
  const today=todayStr();
  const due=[];
  clients.forEach(c=>{
    (c.followups||[]).forEach((f,fi)=>{
      if(f.nextDate&&f.nextDate<=today&&f.status!=='完成'){
        due.push({client:c.name, date:f.nextDate, content:f.content||'', clientId:c.id, fi});
      }
    });
  });
  return due;
}
function showReminderBanner(due){
  let banner=document.getElementById('reminder-banner');
  if(!banner){
    banner=document.createElement('div');
    banner.id='reminder-banner';
    banner.style.cssText='position:fixed;top:0;left:0;right:0;z-index:9999;background:#D97706;color:#fff;padding:10px 16px;font-size:13px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.2)';
    document.body.prepend(banner);
  }
  const overdue=due.filter(d=>d.date<todayStr());
  const today=due.filter(d=>d.date===todayStr());
  const lines=[];
  if(today.length) lines.push(`📅 今日跟进 ${today.length} 项：`+today.map(d=>d.client).join('、'));
  if(overdue.length) lines.push(`⚠️ 逾期未跟进 ${overdue.length} 项：`+overdue.map(d=>d.client+'('+d.date+')').join('、'));
  banner.innerHTML=lines.join(' &nbsp;|&nbsp; ')
    +'<button onclick="document.getElementById(\'reminder-banner\').remove()" style="margin-left:auto;background:rgba(255,255,255,.25);border:none;color:#fff;border-radius:5px;padding:3px 10px;cursor:pointer;font-size:12px">忽略</button>';
}
function fireBrowserNotification(due){
  if(Notification.permission!=='granted') return;
  const today=due.filter(d=>d.date===todayStr());
  const overdue=due.filter(d=>d.date<todayStr());
  if(today.length){
    new Notification('Orient CRM — 今日跟进提醒',{
      body:'今日需跟进：'+today.map(d=>d.client).join('、'),
      icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><text y="28" font-size="28">🧳</text></svg>'
    });
  }
  if(overdue.length){
    new Notification('Orient CRM — 逾期跟进提醒',{
      body:'以下客户跟进已逾期：'+overdue.map(d=>d.client+'('+d.date+')').join('、'),
      icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><text y="28" font-size="28">⚠️</text></svg>'
    });
  }
}
function checkFollowupReminders(){
  const due=getDueFollowups();
  if(!due.length) return;
  showReminderBanner(due);
  fireBrowserNotification(due);
}
function scheduleNineAM(){
  const now=new Date();
  const next9=new Date(now);
  next9.setHours(9,0,0,0);
  if(next9<=now) next9.setDate(next9.getDate()+1); // already past 9am today → schedule tomorrow
  const ms=next9-now;
  setTimeout(()=>{
    checkFollowupReminders();
    setInterval(checkFollowupReminders, 24*60*60*1000); // then every 24h
  }, ms);
}
function requestNotifPermission(){
  if(!('Notification' in window)) return;
  if(Notification.permission==='default'){
    Notification.requestPermission();
  }
}

load(); renderList(); updateStats();
// 页面加载时立即检查（每次打开都检查）
checkFollowupReminders();
// 同时在每天9点自动检查（页面常驻时）
scheduleNineAM();
// 首次运行时申请通知权限
requestNotifPermission();
</script>
